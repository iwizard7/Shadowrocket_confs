name: Monitor Upstream Updates

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOS=(
            "blackmatrix7/ios_rule_script"
            "DivineEngine/Profiles"
            "misha-tgshv/shadowrocket-configuration-file"
            "itdoginfo/shadowrocket"
            "Johnshall/Shadowrocket-ADBlock-Rules-Forever"
            "Jeff2Ma/Shadowrocket-Conf-Rules"
          )

          if [ -f .last_check ]; then
            LAST_CHECK=$(cat .last_check)
          else
            LAST_CHECK="2024-01-01T00:00:00Z"
          fi

          UPDATES=""
          NEW_CHECK_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Checking updates since $LAST_CHECK..."

          for repo in "${REPOS[@]}"; do
            echo "Processing $repo..."
            # Определяем дефолтную ветку динамически
            DEFAULT_BRANCH=$(gh api repos/$repo --template '{{.default_branch}}' || echo "main")
            
            # Получаем дату последнего коммита в этой ветке
            LATEST_COMMIT_DATE=$(gh api repos/$repo/commits/$DEFAULT_BRANCH --template '{{.commit.author.date}}' 2>/dev/null || echo "")
            
            if [[ -z "$LATEST_COMMIT_DATE" ]]; then
              echo "Warning: Could not get commit date for $repo"
              continue
            fi

            if [[ "$LATEST_COMMIT_DATE" > "$LAST_CHECK" ]]; then
              echo "Update found for $repo: $LATEST_COMMIT_DATE"
              UPDATES="$UPDATES\n- [$repo](https://github.com/$repo) (Updated: $LATEST_COMMIT_DATE)"
            fi
          done

          if [ -n "$UPDATES" ]; then
            echo "updates_found=true" >> $GITHUB_OUTPUT
            # Оборачиваем в кавычки для безопасности
            echo "REPORT_BODY<<EOF" >> $GITHUB_ENV
            echo -e "Найдено обновление в следующих репозиториях:$UPDATES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "updates_found=false" >> $GITHUB_OUTPUT
          fi

          echo "$NEW_CHECK_DATE" > .last_check

      - name: Create GitHub Issue
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🚀 Найдено обновление в сторонних репозиториях!" \
            --body "$REPORT_BODY" \
            --label "autogenerated"

      - name: Commit state
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .last_check || true
          git commit -m "Update last check timestamp" || echo "No changes to commit"
          git push origin main || echo "Failed to push state"
