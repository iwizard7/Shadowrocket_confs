name: Monitor Upstream Updates

on:
  schedule:
    - cron: '0 0 */3 * *' # Запуск каждые 3 дня в 00:00 UTC
  workflow_dispatch: # Позволяет запускать вручную из интерфейса GitHub

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Список репозиториев для мониторинга
          REPOS=(
            "blackmatrix7/ios_rule_script"
            "DivineEngine/Profiles"
            "misha-tgshv/shadowrocket-configuration-file"
            "itdoginfo/shadowrocket"
            "Johnshall/Shadowrocket-ADBlock-Rules-Forever"
            "Jeff2Ma/Shadowrocket-Conf-Rules"
          )

          # Читаем дату последней проверки из файла (или ставим старую дату, если файла нет)
          if [ -f .last_check ]; then
            LAST_CHECK=$(cat .last_check)
          else
            LAST_CHECK="2024-01-01T00:00:00Z"
          fi

          UPDATES=""
          NEW_CHECK_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Checking updates since $LAST_CHECK..."

          for repo in "${REPOS[@]}"; do
            echo "Checking $repo..."
            LATEST_COMMIT_DATE=$(gh api repos/$repo/commits/main --template '{{.commit.author.date}}' 2>/dev/null || gh api repos/$repo/commits/master --template '{{.commit.author.date}}' 2>/dev/null)
            
            if [[ "$LATEST_COMMIT_DATE" > "$LAST_CHECK" ]]; then
              UPDATES="$UPDATES\n- [$repo](https://github.com/$repo) (Updated: $LATEST_COMMIT_DATE)"
            fi
          done

          if [ -n "$UPDATES" ]; then
            echo "updates_found=true" >> $GITHUB_OUTPUT
            echo -e "REPORT_BODY=Найдено обновление в следующих репозиториях:$UPDATES" >> $GITHUB_ENV
          else
            echo "updates_found=false" >> $GITHUB_OUTPUT
          fi

          # Сохраняем новую дату проверки
          echo "$NEW_CHECK_DATE" > .last_check

      - name: Create GitHub Issue
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🚀 Найдено обновление в сторонних репозиториях!" \
            --body "$REPORT_BODY" \
            --label "autogenerated"

      - name: Commit state
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .last_check
          git commit -m "Update last check timestamp" || echo "No changes to commit"
          git push origin main
